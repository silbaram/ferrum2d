<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); display: flex; align-items: center; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--bg-3); border: 1px solid var(--border-strong); }
  .tag { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); }
  .val { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-4); }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:0"></div><span class="tag">--radius-0</span><span class="val">0px · panels</span></div>
  <div class="item"><div class="box" style="border-radius:2px"></div><span class="tag">--radius-1</span><span class="val">2px · buttons</span></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="tag">--radius-2</span><span class="val">4px · menus</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="tag">--radius-3</span><span class="val">8px · modals</span></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><span class="tag">--radius-pill</span><span class="val">pill · pip</span></div>
</body></html>
