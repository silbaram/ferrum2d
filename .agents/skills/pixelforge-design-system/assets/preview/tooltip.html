<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Tooltip</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body {
    margin: 0; padding: 38px 22px;
    /* Rich backdrop so the glass effect actually reads.
       Mimics the IDE viewport: sky + grass + ground, so tooltips feel like
       they're floating above the live scene. */
    background:
      radial-gradient(120% 80% at 70% 10%, rgba(245,167,66,.10), transparent 60%),
      linear-gradient(180deg, #2a4a7a 0%, #5586c2 38%, #4caf50 38%, #66bb6a 42%, #4a2f1a 42%, #6b4527 100%);
    display: flex; gap: 60px; align-items: center; justify-content: center;
    min-height: 240px;
    overflow: hidden;
    position: relative;
  }
  /* subtle grain over the whole backdrop so it doesn't look CG */
  body::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    opacity: .04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='.8'/></svg>");
    mix-blend-mode: overlay;
  }

  .anchor {
    width: 30px; height: 30px;
    background: rgba(13, 17, 23, .55);
    border: 1px solid rgba(255,255,255,.10);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.10),
      0 2px 6px rgba(0,0,0,.35);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border-radius: 3px;
    display: grid; place-items: center;
    color: var(--fg-1);
    position: relative;
    z-index: 1;
  }

  /* ---- GLASS TOOLTIP ----------------------------------------------- */
  .tip {
    position: absolute;
    /* layered fills:
       1) top-edge sheen (white -> transparent)
       2) translucent slate base                                      */
    background:
      linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.02) 30%, transparent 60%),
      linear-gradient(180deg, rgba(28, 36, 49, .72), rgba(13, 17, 23, .68));
    border: 1px solid rgba(255,255,255,.14);
    /* The big glass trick: blur whatever is behind the element.
       saturate gives the smoky tint a richer color cast. */
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);

    color: var(--fg-1);
    font-family: var(--ff-ui);
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 4px;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 8px;

    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset, /* top highlight */
      0 -1px 0 rgba(0,0,0,.25)    inset,   /* bottom shadow line */
      0 10px 28px rgba(0,0,0,.45),         /* drop */
      0 2px 6px rgba(0,0,0,.35);
  }
  .tip .kbd {
    font-family: var(--ff-mono); font-size: 10px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    border-radius: 2px;
    padding: 1px 5px;
    color: var(--fg-1);
  }
  .tip .accent { color: var(--accent); }

  /* arrow: a rotated square that inherits the same glass fill so the
     blur stays continuous with the bubble */
  .tip::after {
    content: "";
    position: absolute;
    width: 9px; height: 9px;
    background: linear-gradient(135deg, rgba(28,36,49,.72), rgba(13,17,23,.68));
    border: 1px solid rgba(255,255,255,.14);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
  }
  .tip.top    { bottom: 44px; left: 50%; transform: translateX(-50%); }
  .tip.top::after {
    bottom: -5px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    border-top: 0; border-left: 0;
  }
  .tip.right  { left: 44px; top: 50%; transform: translateY(-50%); }
  .tip.right::after {
    left: -5px; top: 50%;
    transform: translateY(-50%) rotate(45deg);
    border-right: 0; border-bottom: 0;
  }
  .tip.bottom { top: 44px; left: 50%; transform: translateX(-50%); }
  .tip.bottom::after {
    top: -5px; left: 50%;
    transform: translateX(-50%) rotate(45deg);
    border-right: 0; border-bottom: 0;
  }
</style></head>
<body>
  <div class="anchor">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><polygon points="6 4 20 12 6 20 6 4"/></svg>
    <span class="tip top">Run the current scene <span class="kbd">F5</span></span>
  </div>
  <div class="anchor">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 5v14M5 12h14"/></svg>
    <span class="tip right">Add child node <span class="kbd">⌘A</span></span>
  </div>
  <div class="anchor">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
    <span class="tip bottom"><span class="accent">⌘</span> Search project</span>
  </div>
</body></html>
