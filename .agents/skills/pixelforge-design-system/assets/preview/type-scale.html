<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); display: grid; gap: 6px; }
  .r { display: grid; grid-template-columns: 130px 64px 1fr; gap: 16px; align-items: baseline; padding: 4px 0; border-bottom: 1px solid var(--divider); }
  .r:last-child { border: 0; }
  .tag { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; }
  .val { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-4); }
  .ex  { color: var(--fg-1); font-family: var(--ff-ui); }
</style></head>
<body>
  <div class="r"><span class="tag">Display</span><span class="val">48 / 700</span><span class="ex" style="font-size:36px;font-weight:700;letter-spacing:-.02em;line-height:1.1">Forge new worlds</span></div>
  <div class="r"><span class="tag">H1</span><span class="val">32 / 600</span><span class="ex" style="font-size:24px;font-weight:600;letter-spacing:-.02em">Inspector</span></div>
  <div class="r"><span class="tag">H2</span><span class="val">24 / 600</span><span class="ex" style="font-size:20px;font-weight:600">Scene Tree</span></div>
  <div class="r"><span class="tag">H3</span><span class="val">20 / 600</span><span class="ex" style="font-size:16px;font-weight:600">Transform</span></div>
  <div class="r"><span class="tag">Body</span><span class="val">14 / 400</span><span class="ex" style="font-size:14px;color:var(--fg-2);line-height:1.55">A node represents a single object in your scene.</span></div>
  <div class="r"><span class="tag">UI</span><span class="val">13 / 500</span><span class="ex" style="font-size:13px;font-weight:500">Run Project</span></div>
  <div class="r"><span class="tag">Row</span><span class="val">12 / 400</span><span class="ex" style="font-size:12px;color:var(--fg-2)">player.gd · 2 errors</span></div>
  <div class="r"><span class="tag">Label</span><span class="val">11 / 400</span><span class="ex" style="font-size:11px;color:var(--fg-3);font-family:var(--ff-mono)">--bg-2</span></div>
  <div class="r"><span class="tag">Caption</span><span class="val">10 / 500</span><span class="ex" style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--ff-mono)">DRAW CALLS</span></div>
</body></html>
