<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Segmented Control &amp; Slider</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); display: flex; flex-direction: column; gap: 18px; }
  .lbl { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; }
  /* segmented */
  .seg {
    display: inline-flex;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px;
    gap: 2px;
  }
  .seg button {
    height: 24px; padding: 0 12px;
    background: transparent; border: 0; border-radius: 2px;
    color: var(--fg-3); cursor: pointer;
    font-family: var(--ff-ui); font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .seg button.active { background: var(--bg-4); color: var(--fg-1); }
  .seg button:hover:not(.active) { color: var(--fg-1); }
  .seg button svg { width: 14px; height: 14px; }

  /* slider */
  .slider {
    height: 14px; position: relative;
    display: flex; align-items: center;
  }
  .slider .track { width: 100%; height: 4px; background: var(--bg-3); border-radius: 999px; }
  .slider .fill  { position: absolute; left: 0; height: 4px; background: var(--accent); border-radius: 999px; }
  .slider .thumb {
    position: absolute;
    width: 14px; height: 14px;
    background: var(--accent);
    border: 1px solid var(--accent-press);
    border-radius: 999px;
    box-shadow: 0 1px 2px rgba(0,0,0,.4);
    transform: translateX(-50%);
  }
  .row { display: grid; grid-template-columns: 110px 1fr 60px; gap: 14px; align-items: center; }
  .row .val { font-family: var(--ff-mono); font-size: 11px; color: var(--fg-2); text-align: right; }
</style></head>
<body>
  <div>
    <div class="lbl" style="margin-bottom:8px;">Segmented control</div>
    <div class="seg">
      <button class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Grid
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        List
      </button>
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="6"/><rect x="3" y="14" width="18" height="6"/></svg>
        Detail
      </button>
    </div>
  </div>

  <div>
    <div class="lbl" style="margin-bottom:8px;">Sliders</div>
    <div style="display:flex; flex-direction:column; gap: 10px;">
      <div class="row">
        <span class="lbl" style="text-transform:none">Volume</span>
        <div class="slider">
          <div class="track"></div>
          <div class="fill" style="width: 68%"></div>
          <div class="thumb" style="left: 68%"></div>
        </div>
        <span class="val">68%</span>
      </div>
      <div class="row">
        <span class="lbl" style="text-transform:none">Pitch</span>
        <div class="slider">
          <div class="track"></div>
          <div class="fill" style="width: 42%"></div>
          <div class="thumb" style="left: 42%"></div>
        </div>
        <span class="val">0.84</span>
      </div>
      <div class="row">
        <span class="lbl" style="text-transform:none">Gravity</span>
        <div class="slider">
          <div class="track"></div>
          <div class="fill" style="width: 90%"></div>
          <div class="thumb" style="left: 90%"></div>
        </div>
        <span class="val">9.81</span>
      </div>
    </div>
  </div>
</body></html>
