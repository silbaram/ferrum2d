<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--bg-0); display: flex; align-items: center; gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box {
    width: 96px; height: 64px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: 4px;
  }
  .tag { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); }
  .val { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-4); }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:none"></div><span class="tag">--shadow-0</span><span class="val">flat</span></div>
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04)"></div><span class="tag">--shadow-1</span><span class="val">hover lift</span></div>
  <div class="item"><div class="box" style="box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04)"></div><span class="tag">--shadow-2</span><span class="val">popover</span></div>
  <div class="item"><div class="box" style="box-shadow:0 16px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.04)"></div><span class="tag">--shadow-3</span><span class="val">modal</span></div>
</body></html>
