<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); display: flex; align-items: flex-end; gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: 1px; width: 24px; }
  .tag { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); }
  .px  { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body>
  <div class="item"><div class="bar" style="height:4px"></div><span class="tag">--sp-1</span><span class="px">4</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span class="tag">--sp-2</span><span class="px">8</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="tag">--sp-3</span><span class="px">12</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="tag">--sp-4</span><span class="px">16</span></div>
  <div class="item"><div class="bar" style="height:20px"></div><span class="tag">--sp-5</span><span class="px">20</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="tag">--sp-6</span><span class="px">24</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="tag">--sp-7</span><span class="px">32</span></div>
  <div class="item"><div class="bar" style="height:40px"></div><span class="tag">--sp-8</span><span class="px">40</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="tag">--sp-9</span><span class="px">48</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="tag">--sp-10</span><span class="px">64</span></div>
</body></html>
