<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Splitter &amp; Resize Handle</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-1); display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-family: var(--ff-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: .08em; }

  .pane {
    display: grid; grid-template-columns: 1fr 4px 1fr;
    height: 100px;
    background: var(--bg-0);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .pane > div:first-child, .pane > div:last-child {
    background: var(--bg-1);
    display: grid; place-items: center;
    color: var(--fg-3); font-family: var(--ff-mono); font-size: 11px;
  }
  .splitter-v {
    background: var(--border);
    cursor: col-resize;
    position: relative;
  }
  .splitter-v:hover, .splitter-v.active { background: var(--accent); }
  .splitter-v::after {
    content: ""; position: absolute;
    left: 1px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 22px;
    background: var(--fg-4);
    border-radius: 1px;
  }
  .splitter-v:hover::after, .splitter-v.active::after { background: rgba(0,0,0,.35); }

  /* horizontal */
  .pane-h {
    display: grid; grid-template-rows: 1fr 4px 1fr;
    height: 140px;
    background: var(--bg-0);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .pane-h > div:first-child, .pane-h > div:last-child {
    background: var(--bg-1);
    display: grid; place-items: center;
    color: var(--fg-3); font-family: var(--ff-mono); font-size: 11px;
  }
  .splitter-h {
    background: var(--border);
    cursor: row-resize;
    position: relative;
  }
  .splitter-h::after {
    content: ""; position: absolute;
    top: 1px; left: 50%; transform: translateX(-50%);
    height: 2px; width: 22px;
    background: var(--fg-4);
    border-radius: 1px;
  }

  /* resize corner */
  .resize-card {
    position: relative;
    background: var(--bg-2);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    width: 200px; height: 100px;
    color: var(--fg-3); font-family: var(--ff-mono); font-size: 11px;
    display: grid; place-items: center;
  }
  .resize-card .grip {
    position: absolute;
    right: 2px; bottom: 2px;
    width: 12px; height: 12px;
    cursor: nwse-resize;
    background-image:
      linear-gradient(135deg, transparent 0 50%, var(--fg-3) 50% 60%, transparent 60% 70%, var(--fg-3) 70% 80%, transparent 80% 90%, var(--fg-3) 90% 100%);
  }
</style></head>
<body>
  <div>
    <div class="lbl" style="margin-bottom:6px;">Vertical splitter (between panels)</div>
    <div class="pane">
      <div>Scene Tree</div>
      <div class="splitter-v active"></div>
      <div>Inspector</div>
    </div>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 220px; gap:14px;">
    <div>
      <div class="lbl" style="margin-bottom:6px;">Horizontal splitter (dock divider)</div>
      <div class="pane-h">
        <div>Viewport</div>
        <div class="splitter-h"></div>
        <div>Console</div>
      </div>
    </div>
    <div>
      <div class="lbl" style="margin-bottom:6px;">Resize handle</div>
      <div class="resize-card">
        Resizable
        <span class="grip"></span>
      </div>
    </div>
  </div>
</body></html>
