- Do not implement a general visual editor without explicit approval.
- Do not treat `updateBehaviorBinding` as behavior recipe body editing or modify `behaviorRecipes.entities` through placement-only UI output.
- Keep authoring output deterministic and spec-patch based.
- Do not move game simulation state into TypeScript authoring UI code.
- Do not add consumer imports from `@ferrum2d/ferrum-web/dist/*` or `pkg/*`.

