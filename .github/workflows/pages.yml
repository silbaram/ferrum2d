name: Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm 10.8.0
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install

      - name: Build examples
        run: pnpm build

      - name: Build Pages artifact
        run: pnpm build:pages

      - name: Validate Pages artifact
        run: pnpm validate:pages-artifact

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed Pages routes
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          if [ -z "$PAGE_URL" ]; then
            echo "Missing GitHub Pages deployment URL" >&2
            exit 1
          fi
          base="${PAGE_URL%/}"
          routes=(
            "/"
            "/docs/"
            "/docs/engine/public-api.html"
            "/starter-runtime/"
            "/topdown-shooter/"
            "/breakout/"
            "/platformer/"
          )
          for route in "${routes[@]}"; do
            url="${base}${route}"
            echo "Checking ${url}"
            route_ok=false
            for attempt in 1 2 3 4 5; do
              if curl --fail --silent --show-error --location --max-time 20 "$url" > /dev/null; then
                route_ok=true
                break
              fi
              echo "Route check failed for ${url}; retrying (${attempt}/5)"
              sleep 5
            done
            if [ "$route_ok" != "true" ]; then
              echo "Route check failed after retries: ${url}" >&2
              exit 1
            fi
          done
