name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'ferrum-web-v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      consumer_smoke:
        description: 'Run package consumer smoke'
        required: false
        default: false
        type: boolean
      extended_browser_smoke:
        description: 'Run extended browser smoke matrix'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm 10.8.0
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Release metadata check
        if: startsWith(github.ref, 'refs/tags/ferrum-web-v')
        run: pnpm release:check

      - name: Release candidate metadata guard
        if: ${{ !startsWith(github.ref, 'refs/tags/ferrum-web-v') }}
        run: pnpm release:candidate-check

      - name: Public API surface guard
        run: pnpm validate:public-api-surface

      - name: Rust tests
        run: cargo test --manifest-path crates/ferrum-core/Cargo.toml

      - name: Rust test harness guard
        run: pnpm validate:rust-test-harness

      - name: Physics smoke tests
        run: pnpm smoke:physics

      - name: Runtime budget profile gate
        run: pnpm smoke:runtime-budgets

      - name: Runtime budget productization guard
        run: pnpm validate:runtime-budget-product

      - name: Mass object stress smoke
        run: pnpm smoke:mass-objects

      - name: Top-down browser mass object smoke
        run: pnpm smoke:topdown-mass-objects

      - name: Top-down browser tilemap budget smoke
        run: pnpm smoke:topdown-tilemap-budget

      - name: Build wasm package
        run: wasm-pack build crates/ferrum-core --target web --out-dir
          ../../packages/ferrum-web/pkg

      - name: Lint TypeScript packages
        run: pnpm lint

      - name: Test packages
        run: pnpm test

      - name: Build TypeScript packages
        run: pnpm build

      - name: Package artifact checks
        if: ${{ !startsWith(github.ref, 'refs/tags/ferrum-web-v') }}
        run: pnpm package:check

      - name: Publish package artifact check
        if: ${{ startsWith(github.ref, 'refs/tags/ferrum-web-v') }}
        run: pnpm package:publish-check:ferrum-web && pnpm package:check:create-game && pnpm package:check:agents

      - name: Gameplay authoring report
        run: pnpm validate:gameplay-authoring:report

      - name: Gameplay replay report
        run: pnpm smoke:gameplay-replay:report

      - name: Gameplay report artifact validation
        run: pnpm validate:gameplay-report-artifacts

      - name: Consumer smoke report validator smoke
        run: pnpm smoke:consumer-smoke-report

      - name: Asset pipeline smoke
        run: pnpm smoke:asset-pipeline

      - name: Create-game template catalog smoke
        run: pnpm smoke:create-game-template-catalog

      - name: Create-game template report smoke
        run: pnpm smoke:create-game-template-reports

      - name: Topdown template replay report smoke
        run: pnpm smoke:topdown-template-replay-report

  consumer-smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/ferrum-web-v') || (github.event_name == 'workflow_dispatch' && inputs.consumer_smoke)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm 10.8.0
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Package consumer smoke
        id: package_consumer_smoke
        run: pnpm package:consumer-smoke -- --artifact-dir artifacts/consumer-smoke

      - name: Validate consumer smoke report
        if: always()
        env:
          EXPECT_STATUS: ${{ steps.package_consumer_smoke.outcome == 'success' && 'passed' || 'failed' }}
        run: pnpm validate:consumer-smoke-report -- --expect-status "$EXPECT_STATUS"

      - name: Upload consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-artifacts
          path: artifacts/consumer-smoke
          if-no-files-found: ignore

  extended-browser-smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/ferrum-web-v') || (github.event_name == 'workflow_dispatch' && inputs.extended_browser_smoke)
    strategy:
      fail-fast: false
      matrix:
        include:
          - smoke: smoke:preload
            artifact: preload
          - smoke: smoke:mobile-input
            artifact: mobile-input
          - smoke: smoke:lighting
            artifact: lighting
          - smoke: smoke:lighting-webgpu
            artifact: lighting-webgpu
          - smoke: smoke:material
            artifact: material
          - smoke: smoke:material-webgpu
            artifact: material-webgpu
          - smoke: smoke:camera-postprocess
            artifact: camera-postprocess
          - smoke: smoke:particle-vfx
            artifact: particle-vfx
          - smoke: smoke:topdown
            artifact: topdown
          - smoke: smoke:topdown-budget
            artifact: topdown-budget
          - smoke: smoke:topdown-save-load
            artifact: topdown-save-load
          - smoke: smoke:topdown-hd2d
            artifact: topdown-hd2d
          - smoke: smoke:destructible-terrain-browser
            artifact: destructible-terrain-browser
          - smoke: smoke:breakout-effects
            artifact: breakout-effects
          - smoke: smoke:breakout-budget
            artifact: breakout-budget
          - smoke: smoke:platformer-effects
            artifact: platformer-effects
          - smoke: smoke:platformer-budget
            artifact: platformer-budget
          - smoke: smoke:physics-sandbox
            artifact: physics-sandbox
          - smoke: smoke:physics-sandbox-budget
            artifact: physics-sandbox-budget
          - smoke: smoke:physics-demo-suite
            artifact: physics-demo-suite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm 10.8.0
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Extended browser smoke
        env:
          FERRUM_BROWSER_SMOKE_TIMEOUT_MS: 30000
          FERRUM_BROWSER_SMOKE_BUDGET_ARTIFACT_DIR: artifacts/browser-smoke-budgets
        run: pnpm ${{ matrix.smoke }}

      - name: Upload browser smoke budget artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extended-browser-smoke-${{ matrix.artifact }}
          path: artifacts/browser-smoke-budgets
          if-no-files-found: ignore
